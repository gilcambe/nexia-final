<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#0a0e17;color:#e0e6f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#131929;border:1px solid rgba(0,229,255,.15);border-radius:16px;padding:32px;max-width:480px;width:100%}

  p{font-size:13px;color:#8899b2;margin-bottom:24px}

  input:focus{border-color:#00e5ff}
  button{width:100%;padding:12px;background:linear-gradient(135deg,#00e5ff,#7b5cfa);border:none;border-radius:8px;color:#000;font-size:14px;font-weight:700;cursor:pointer}
  #msg{margin-top:16px;font-size:13px;text-align:center;min-height:20px}
  .success{color:#00e87a} .error{color:#ff3d71}

  try {
    const db = firebase.firestore();
    const ref = db.collection('ces_credentials').doc(code);
    const snap = await ref.get();
    if (!snap.exists) { msg.className='error'; msg.textContent='❌ Credencial não encontrada.'; return; }
    const data = snap.data();
    if (data.checkedIn) { msg.className='error'; msg.textContent='⚠️ Esta credencial já foi utilizada.'; return; }
    await ref.update({ checkedIn: true, checkedInAt: firebase.firestore.FieldValue.serverTimestamp(), checkedInName: name });
    await db.collection('ces_checkins').add({ code, name, tenant:'CES_2027_BR', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    msg.className='success'; msg.textContent='✅ Check-in realizado com sucesso! Bem-vindo(a), ' + name + '!';
    document.getElementById('code').value='';
    document.getElementById('name').value='';
  } catch(e) { msg.className='error'; msg.textContent='Erro: ' + e.message; }
}
</script>
