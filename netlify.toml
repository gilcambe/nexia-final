# ── Scheduled: Internal Agents rodam a cada hora (auto-healing)
[functions."internal-agents"]
  schedule = "0 * * * *"

# ── Scheduled: Churn Predictor roda todo dia às 07:00 BRT
[functions."churn-predictor"]
  schedule = "0 10 * * *"

# ── Scheduled: KPI Engine snapshot diário às 01:00 BRT
[functions."kpi-engine"]
  schedule = "0 4 * * *"


[[redirects]]
