# SPA fallback — MUST be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── HTTP Security Headers ─────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://sdk.twilio.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://www.gstatic.com wss://*.firebaseio.com https://api.anthropic.com https://api.groq.com https://api.openai.com https://api.deepseek.com https://generativelanguage.googleapis.com https://api.x.ai https://api.perplexity.ai https://api.together.xyz https://api.cerebras.ai https://api.sambanova.ai https://api.mistral.ai https://api.cohere.ai https://integrate.api.nvidia.com https://openrouter.ai https://router.huggingface.co https://brasilapi.com.br https://www.receitaws.com.br https://api.nfe.io https://api.mercadopago.com https://api.stripe.com https://api.twilio.com https://api.resend.com https://euapi.ttlock.com https://graph.facebook.com https://api.whatsapp.com https://api.qrserver.com https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://youtube.com https://maps.google.com https://js.stripe.com https://hooks.stripe.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; upgrade-insecure-requests"
