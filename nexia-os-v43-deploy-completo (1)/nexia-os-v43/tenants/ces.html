  <body>
    <!-- 初始加载进度条 -->
    <div id="init-loading">
      <div class="init-loading-progress"></div>
    </div>

    <style>
      #init-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: #e5e7eb;
        z-index: 9999;
        overflow: hidden;
        transition: opacity 0.3s ease-out;
      }

      #init-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .init-loading-progress {
        height: 100%;
        background: rgba(112, 87, 255, 1);
        animation: loading-progress 1.5s ease-out forwards;
        transform-origin: left;
        transition: transform 0.3s ease-out;
        position: relative;
        overflow: hidden;
      }

      /* 高光效果 */
      .init-loading-progress::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 40%;
        height: 100%;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.6) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        animation: shine 2s ease-in-out infinite;
      }

      @keyframes loading-progress {
        0% {
          transform: scaleX(0);
        }
        100% {
          transform: scaleX(0.9);
        }
      }

      @keyframes shine {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }

      /* 暗色主题适配 */
      html.dark #init-loading {
        background-color: #1e293b;
      }
    </style>
