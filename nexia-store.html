<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXIA Store — 224+ Módulos & Extensões</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090E;--bg2:#0A0D16;--bg3:#0E1220;--bg4:#111827;
  --blue:#0057FF;--cyan:#00E5FF;--green:#00D68F;--red:#FF3D71;
  --purple:#9B5CF6;--orange:#F59E0B;--gold:#DAA520;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;
  --ff:'Sora',sans-serif;--ffm:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--ff);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
/* Splash */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{font-size:3rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-sub{font-family:var(--ffm);color:var(--text3);font-size:.85rem;margin-top:.5rem;letter-spacing:3px}
/* Topbar */
.topbar{position:sticky;top:0;z-index:100;background:rgba(7,9,14,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.topbar-logo{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-nav{display:flex;gap:1rem;align-items:center}
.lang-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:.3rem .8rem;border-radius:6px;cursor:pointer;font-family:var(--ffm);font-size:.75rem;transition:.2s}
.lang-btn.active,.lang-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.cart-btn{background:var(--blue);color:#fff;border:none;padding:.4rem 1.2rem;border-radius:8px;cursor:pointer;font-family:var(--ff);font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:.5rem;transition:.2s}
.cart-btn:hover{background:#0043cc}
.cart-badge{background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-weight:700}
/* Hero */
.hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);padding:3rem 2rem 2.5rem;text-align:center}
.hero-eyebrow{font-family:var(--ffm);color:var(--blue);font-size:.75rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:.8rem}
.hero h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:800;line-height:1.15;margin-bottom:.8rem}
.hero h1 span{background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);max-width:600px;margin:0 auto 1.5rem;line-height:1.6}
.hero-stats{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat strong{display:block;font-size:1.5rem;font-weight:700;color:var(--blue)}
.hero-stat span{font-size:.75rem;color:var(--text3)}
/* Filters */
.filters{background:var(--bg2);border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;position:sticky;top:60px;z-index:90}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:320px}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:.55rem .8rem .55rem 2.4rem;border-radius:8px;font-family:var(--ff);font-size:.85rem;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.9rem}
.cat-pills{display:flex;gap:.5rem;flex-wrap:wrap}
.pill{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:.35rem .9rem;border-radius:20px;font-size:.78rem;cursor:pointer;transition:.2s;white-space:nowrap}
.pill.active,.pill:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.sort-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:.5rem .8rem;border-radius:8px;font-family:var(--ff);font-size:.78rem;outline:none;cursor:pointer}
/* Grid */
.main{max-width:1400px;margin:0 auto;padding:2rem}
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.results-count{color:var(--text2);font-size:.85rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem}
/* Card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.3s;cursor:pointer;position:relative;display:flex;flex-direction:column}
.card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,87,255,.15)}
.card.featured{border-color:rgba(0,87,255,.3)}
.card-bar{height:3px;background:linear-gradient(90deg,var(--blue),var(--cyan))}
.card-top{padding:1.2rem 1.2rem .8rem;flex:1}
.card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:.8rem;background:rgba(0,87,255,.12);border:1px solid rgba(0,87,255,.2)}
.card-name{font-weight:700;font-size:1rem;margin-bottom:.4rem}
.card-desc{color:var(--text2);font-size:.82rem;line-height:1.5;margin-bottom:.8rem}
.card-tags{display:flex;gap:.4rem;flex-wrap:wrap}
.tag{background:var(--bg3);color:var(--text3);font-size:.68rem;padding:.2rem .6rem;border-radius:4px;font-family:var(--ffm)}
.badges{position:absolute;top:.8rem;right:.8rem;display:flex;gap:.3rem;flex-direction:column;align-items:flex-end}
.badge{font-size:.6rem;font-weight:700;padding:.15rem .5rem;border-radius:4px;letter-spacing:.5px}
.badge.hot{background:var(--red);color:#fff}
.badge.new{background:var(--green);color:#000}
.badge.popular{background:var(--orange);color:#000}
.badge.beta{background:var(--purple);color:#fff}
.card-footer{padding:.8rem 1.2rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.price-brl{font-weight:800;font-size:1.05rem;color:var(--text)}
.price-period{font-size:.7rem;color:var(--text3);margin-top:.1rem}
.add-btn{background:var(--blue);color:#fff;border:none;padding:.4rem 1rem;border-radius:7px;font-family:var(--ff);font-weight:600;font-size:.78rem;cursor:pointer;transition:.2s;white-space:nowrap}
.add-btn:hover{background:#0043cc}
.add-btn.added{background:var(--green);color:#000}
/* Cart Drawer */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:.3s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:360px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--border2);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:.35s cubic-bezier(.4,0,.2,1)}
.cart-overlay.open .cart-drawer{transform:none}
.cart-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-header h3{font-weight:700}
.close-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.cart-items{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.cart-item{display:flex;align-items:center;gap:1rem;padding:.8rem 0;border-bottom:1px solid var(--border)}
.cart-item-icon{font-size:1.4rem;width:38px;text-align:center}
.cart-item-info{flex:1}
.cart-item-name{font-size:.85rem;font-weight:600}
.cart-item-price{font-size:.78rem;color:var(--text2);font-family:var(--ffm)}
.cart-item-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.85rem;padding:.3rem}
.cart-item-remove:hover{color:var(--red)}
.cart-empty{text-align:center;padding:3rem 0;color:var(--text3)}
.cart-empty .emoji{font-size:2.5rem;margin-bottom:.5rem}
.cart-footer{padding:1.2rem 1.5rem;border-top:1px solid var(--border)}
.cart-total{display:flex;justify-content:space-between;margin-bottom:.3rem}
.cart-total .lbl{color:var(--text2);font-size:.85rem}
.cart-total .val{font-weight:700;font-size:1rem}
.cart-total .usd{color:var(--text3);font-size:.75rem}
.checkout-btn{width:100%;background:var(--blue);color:#fff;border:none;padding:.85rem;border-radius:10px;font-family:var(--ff);font-weight:700;font-size:.95rem;cursor:pointer;margin-top:1rem;transition:.2s}
.checkout-btn:hover{background:#0043cc}
/* Checkout Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;padding:1rem}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:480px;padding:2rem;max-height:90vh;overflow-y:auto}
.modal h3{font-weight:700;font-size:1.15rem;margin-bottom:1.5rem}
.pay-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.pay-tab{flex:1;padding:.6rem;border-radius:8px;border:2px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;text-align:center;font-family:var(--ff);font-size:.82rem;font-weight:600;transition:.2s}
.pay-tab.active{border-color:var(--blue);color:var(--blue);background:rgba(0,87,255,.08)}
.pix-panel,.card-panel{display:none}
.pix-panel.show,.card-panel.show{display:block}
.pix-amount{background:var(--bg3);border-radius:10px;padding:1.2rem;text-align:center;margin-bottom:1rem}
.pix-amount .big{font-size:2rem;font-weight:800;color:var(--green)}
.pix-amount .disc{font-size:.75rem;color:var(--green);margin-top:.2rem}
.pix-key{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:.8rem;font-family:var(--ffm);font-size:.8rem;color:var(--text2);margin-bottom:1rem;word-break:break-all}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:.4rem}
.form-group input,.form-group select{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:.6rem .8rem;border-radius:8px;font-family:var(--ff);font-size:.85rem;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.modal-total{display:flex;justify-content:space-between;margin:1rem 0;padding:.8rem;background:var(--bg3);border-radius:8px}
.confirm-btn{width:100%;background:var(--green);color:#000;border:none;padding:.85rem;border-radius:10px;font-family:var(--ff);font-weight:800;font-size:.95rem;cursor:pointer;transition:.2s;margin-top:.5rem}
.confirm-btn:hover{background:#00b87a}
.modal-close{float:right;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:.3rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem;margin-top:-1rem;margin-right:-1rem}
/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(4rem);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:.7rem 1.4rem;border-radius:10px;font-size:.85rem;z-index:500;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Footer */
footer{background:var(--bg2);border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text3);font-size:.8rem;margin-top:4rem}
/* Empty state */
.no-results{text-align:center;padding:4rem 2rem;color:var(--text2)}
.no-results .emoji{font-size:3rem;margin-bottom:1rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;padding:1rem;overflow-y:auto}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;position:relative}
.modal-close-btn{position:sticky;top:.8rem;left:100%;margin-right:.8rem;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:10;float:right;margin-top:.8rem}
.modal-close-btn:hover{color:var(--text)}
.detail-header{padding:2rem 2rem 1.2rem;clear:both}
.detail-icon-wrap{font-size:2.8rem;width:60px;height:60px;background:rgba(0,87,255,.12);border:1px solid rgba(0,87,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1rem}
.detail-name{font-size:1.4rem;font-weight:800;margin-bottom:.5rem}
.detail-meta{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.detail-price{font-size:1.1rem;font-weight:700;color:var(--blue)}
.detail-body{padding:0 2rem 1.5rem}
#detail-video-wrap{margin-bottom:1.5rem}
.video-thumb{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:16/9;background:#000}
.video-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:.2s}
.video-thumb:hover img{opacity:.8}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:rgba(0,87,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#fff;transition:.2s;pointer-events:none}
.video-thumb:hover .play-btn{transform:translate(-50%,-50%) scale(1.1)}
.video-label{position:absolute;bottom:.8rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:.75rem;padding:.2rem .8rem;border-radius:20px;font-weight:600;white-space:nowrap;pointer-events:none}
.detail-desc{color:var(--text2);line-height:1.7;margin-bottom:1.5rem;font-size:.9rem}
.detail-body h4{font-size:.78rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:.7rem;font-family:var(--ffm)}
.detail-body ul{list-style:none;margin-bottom:1.5rem}
.detail-body ul li{padding:.45rem 0;color:var(--text2);font-size:.88rem;display:flex;gap:.6rem;align-items:flex-start;border-bottom:1px solid var(--border)}
.detail-body ul li::before{content:"→";color:var(--blue);font-weight:700;flex-shrink:0}
.detail-body ul.usecases li::before{content:"✓";color:var(--green)}
.detail-body code{display:block;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.5rem .8rem;font-family:var(--ffm);font-size:.78rem;color:var(--cyan);margin-bottom:1.5rem}
.detail-footer{padding:1.2rem 2rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.8rem}
.confirm-btn{background:var(--blue);color:#fff;border:none;padding:.65rem 1.4rem;border-radius:8px;cursor:pointer;font-family:var(--ff);font-weight:700;font-size:.9rem;transition:.2s}
.confirm-btn:hover{background:#0043cc}
.confirm-btn.added{background:rgba(0,214,143,.15);color:var(--green);border:1px solid rgba(0,214,143,.4)}

/* Responsive */
@media(max-width:900px){
  .topbar-right .tb-links{display:none}
  .hero{padding:2.5rem 1.2rem}
  .hero h1{font-size:1.8rem}
  .filters{padding:1rem;flex-wrap:wrap;gap:.5rem}
  .search-wrap{min-width:100%;max-width:100%}
}
@media(max-width:640px){
  .topbar{padding:0 1rem}
  .hero{padding:2rem 1rem}
  .hero h1{font-size:1.5rem}
  .filters{padding:.8rem}
  .main{padding:.8rem}
  .grid{grid-template-columns:1fr 1fr}
  .cart-drawer{width:100vw}
  .modal{width:96vw!important;max-width:none!important;margin:0 auto}
  .pay-tabs{flex-direction:column}
}
@media(max-width:420px){
  .grid{grid-template-columns:1fr}
  .hero-stats{flex-direction:column;gap:.5rem;align-items:center}
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="../core/config.js"></script>
<script src="../core/auth.js"></script>

<script>
// Inicializa tenantId e userId a partir do NexiaAuth após login
document.addEventListener('DOMContentLoaded', () => {
  if (typeof NexiaAuth !== 'undefined') {
    NexiaAuth.onChange(user => {
      if (user) {
        const p = (typeof NexiaAuth !== 'undefined' && NexiaAuth.getProfile ? NexiaAuth.getProfile() : null);
        window._nexiaTenantId = p?.tenantSlug || 'nexia';
        window._nexiaUserId   = user.uid;
      }
    });
  }
});
</script>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-logo">✦ NEXIA STORE</div>
  <div class="splash-sub">MÓDULOS & EXTENSÕES</div>
</div>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-logo">✦ NEXIA STORE</div>
  <nav class="topbar-nav">
    <button class="lang-btn active" onclick="setLang('pt')">PT</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
    <button class="cart-btn" onclick="openCart()">
      🛒 <span data-t="cart"></span>
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <div class="hero-eyebrow" data-t="eyebrow"></div>
  <h1><span data-t="h1a"></span> <span data-t="h1b"></span></h1>
  <p data-t="heroSub"></p>
  <div class="hero-stats">
    <div class="hero-stat"><strong>224+</strong><span data-t="modules"></span></div>
    <div class="hero-stat"><strong>7</strong><span data-t="categories"></span></div>
    <div class="hero-stat"><strong>15.284</strong><span data-t="agents"></span></div>
    <div class="hero-stat"><strong>R$19.290</strong><span data-t="mrr"></span></div>
  </div>
</section>

<!-- ── NEXIA AI SEARCH ── -->
<div style="background:linear-gradient(135deg,rgba(0,87,255,.08),rgba(168,85,247,.06));border-bottom:1px solid rgba(0,87,255,.15);padding:20px 5%">
  <div style="max-width:900px;margin:0 auto">
    <div style="font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(0,87,255,.9);margin-bottom:10px;display:flex;align-items:center;gap:6px">
      <span>✦</span> NEXIA AI — Diga o que você precisa fazer
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <div style="flex:1;position:relative">
        <input type="text" id="ai-search-input"
          placeholder="Ex: 'Quero cobrar meus clientes automaticamente', 'Preciso de um chatbot no WhatsApp', 'Quero emitir nota fiscal'..."
          style="width:100%;padding:14px 18px 14px 46px;border-radius:12px;background:rgba(0,0,0,.3);border:1px solid rgba(0,87,255,.3);color:#E8F0FF;font-size:14px;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s"
          onfocus="this.style.borderColor='rgba(0,87,255,.6)'"
          onblur="this.style.borderColor='rgba(0,87,255,.3)'"
          onkeydown="if(event.key==='Enter') aiSearchModules()">
        <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px">🤖</span>
      </div>
      <button onclick="aiSearchModules()" style="padding:14px 24px;border-radius:12px;background:linear-gradient(135deg,#0057FF,#7C3AED);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;font-family:'Sora',sans-serif;transition:opacity .2s" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
        ✦ Buscar com IA
      </button>
    </div>
    <div id="ai-search-result" style="display:none;margin-top:14px;background:rgba(0,0,0,.3);border:1px solid rgba(0,87,255,.2);border-radius:10px;padding:14px"></div>
  </div>
</div>

<!-- Filters -->
<div class="filters" id="filters-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="..." data-t-ph="searchPh" oninput="filterModules()">
  </div>
  <div class="cat-pills" id="cat-pills"></div>

function applyI18n(){
  document.querySelectorAll('[data-t]').forEach(el=>{

const CATS = ['all','cortex','automacao','analytics','comunicacao','seguranca','financeiro','infra','saude','educacao','juridico','logistica','rh','eventos','turismo','leiloes','varejo','imoveis','agro','construcao','manufatura','marketing','contabilidade','financeiro-adv','condominios','fitness','beleza','pet','odontologia','estetica','foodtech','seguros','energia','telecom','marketplaces'];
const CAT_KEYS = {
  all:'catAll',cortex:'catCortex',automacao:'catAutomacao',analytics:'catAnalytics',
  comunicacao:'catComunicacao',seguranca:'catSeguranca',financeiro:'catFinanceiro',infra:'catInfra',
  saude:'catSaude',educacao:'catEducacao',juridico:'catJuridico',logistica:'catLogistica',rh:'catRh',
  eventos:'catEventos',turismo:'catTurismo',leiloes:'catLeiloes',varejo:'catVarejo',imoveis:'catImoveis',
  agro:'catAgro',construcao:'catConstrucao',manufatura:'catManufatura',marketing:'catMarketing',
  contabilidade:'catContabilidade','financeiro-adv':'catFinanceiroAdv',condominios:'catCondominios',
  fitness:'catFitness',beleza:'catBeleza',pet:'catPet',odontologia:'catOdontologia',
  estetica:'catEstetica',foodtech:'catFoodtech',seguros:'catSeguros',energia:'catEnergia',
  telecom:'catTelecom',marketplaces:'catMarketplaces'
};

// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
let cart = [];
let activeCat = 'all';
let filtered = [...MODULES];

// ═══════════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════════
function rebuildCatPills(){
  const c = document.getElementById('cat-pills');
  c.innerHTML = CATS.map(cat=>`
    <button class="pill${activeCat===cat?' active':''}" onclick="setCat('${cat}')">${t(CAT_KEYS[cat])}</button>
  `).join('');
}

function setCat(cat){
  activeCat = cat;
  rebuildCatPills();
  filterModules();
}

function filterModules(){
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const sort = document.getElementById('sort-select').value;
  filtered = MODULES.filter(m=>{
    const matchCat = activeCat==='all' || m.cat===activeCat;
    const desc = m.desc[LANG]||m.desc.pt;
    const matchQ = !q || m.name.toLowerCase().includes(q) || desc.toLowerCase().includes(q) ||
      m.tags.some(tag=>tag.includes(q)) || t(CAT_KEYS[m.cat]).toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  if(sort==='price-asc') filtered.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc') filtered.sort((a,b)=>b.price-a.price);
  else if(sort==='name') filtered.sort((a,b)=>a.name.localeCompare(b.name));
  else filtered.sort((a,b)=>b.pop-a.pop);
  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('modules-grid');
  const noRes = document.getElementById('no-results');
  const count = document.getElementById('results-count');
  count.textContent = `${filtered.length} ${t('resultsOf')} ${MODULES.length} ${t('resultsModules')}`;
  if(!filtered.length){
    grid.innerHTML='';
    noRes.style.display='block';
    noRes.querySelector('p').textContent=t('noResults');
    return;
  }
  noRes.style.display='none';
  grid.innerHTML = filtered.map(m=>{
    const inCart = cart.some(c=>c.id===m.id);
    const desc = m.desc[LANG]||m.desc.pt;
    return `<div class="card${m.featured?' featured':''}" id="card-${m.id}" onclick="openDetail('${m.id}')" style="cursor:pointer">
      ${m.featured?'<div class="card-bar"></div>':''}
      <div class="card-top">
        <div class="card-icon">${m.icon}</div>
        ${m.badge?`<div class="badges"><span class="badge ${m.badge}">${m.badge.toUpperCase()}</span></div>`:''}
        <div class="card-name">${m.name}</div>
        <div class="card-desc">${desc}</div>
        <div class="card-tags">${m.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
      </div>
      <div class="card-footer">
        <div>
          <div class="price-brl">R$ ${m.price}${t('monthLabel')}</div>
          <div class="price-period">${t('perMonth')}</div>
        </div>
        <button class="add-btn${inCart?' added':''}" onclick="event.stopPropagation();toggleCart('${m.id}')">
          ${inCart?'✓ '+t('cart'):'+ '+t('cart')}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// Cart
// ═══════════════════════════════════════════════════════════════
function toggleCart(id){
  const idx = cart.findIndex(c=>c.id===id);
  const m = MODULES.find(m=>m.id===id);
  if(idx>=0){
    cart.splice(idx,1);
    toast(`${m.name} ${t('removedFromCart')}`);
  } else {
    cart.push({...m});
    toast(`${m.name} ${t('addedToCart')}`);
  }
  updateCartBadge();
  renderGrid();
  if(document.getElementById('cart-overlay').classList.contains('open')) renderCartItems();
}

function updateCartBadge(){
  document.getElementById('cart-count').textContent = cart.length;
}

function openCart(){
  document.getElementById('cart-overlay').classList.add('open');
  renderCartItems();
}
function closeCart(){document.getElementById('cart-overlay').classList.remove('open')}
function closeCartOnOverlay(e){if(e.target===document.getElementById('cart-overlay'))closeCart();}

function renderCartItems(){
  const list = document.getElementById('cart-items-list');
  const footer = document.getElementById('cart-footer');
  if(!cart.length){
    list.innerHTML=`<div class="cart-empty"><div class="emoji">🛒</div><p>${t('cartEmpty')}</p><small>${t('cartEmptySub')}</small></div>`;
    footer.style.display='none';
    return;
  }
  footer.style.display='block';
  list.innerHTML = cart.map(m=>`
    <div class="cart-item">
      <div class="cart-item-icon">${m.icon}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${m.name}</div>
        <div class="cart-item-price">R$ ${m.price}${t('monthLabel')}</div>
      </div>
      <button class="cart-item-remove" onclick="event.stopPropagation();toggleCart('${m.id}')">✕</button>
    </div>
  `).join('');
  const total = cart.reduce((s,m)=>s+m.price,0);
  const usd = (total/5.2).toFixed(2);
  document.getElementById('cart-total-brl').textContent = `R$ ${total}${t('monthLabel')}`;
  document.getElementById('cart-total-usd').textContent = `≈ USD ${usd}`;
  updateCartUI();
}

function updateCartUI(){
  updateCartBadge();
}

// ═══════════════════════════════════════════════════════════════
// Checkout
// ═══════════════════════════════════════════════════════════════
function openCheckout(){
  const total = cart.reduce((s,m)=>s+m.price,0);
  const pixTotal = (total*0.95).toFixed(2);
  document.getElementById('pix-amount-val').textContent = `R$ ${pixTotal}`;
  document.getElementById('card-total-val').textContent = `R$ ${total}${t('monthLabel')}`;
  // installments
  const sel = document.getElementById('installments-select');
  sel.innerHTML = Array.from({length:12},(_,i)=>{
    const n = i+1;
    const v = (total/n).toFixed(2);
    return `<option value="${n}">${n}x de R$ ${v}</option>`;
  }).join('');
  document.getElementById('checkout-modal').classList.add('open');
}
function closeCheckout(){document.getElementById('checkout-modal').classList.remove('open')}
function switchTab(tab){
  document.getElementById('panel-pix').className='pix-panel'+(tab==='pix'?' show':'');
  document.getElementById('panel-card').className='card-panel'+(tab==='card'?' show':'');
  document.getElementById('tab-pix').className='pay-tab'+(tab==='pix'?' active':'');

async function confirmPix(){
  const pixTotal = parseFloat(document.getElementById('pix-amount-val')?.textContent?.replace('R$ ','') || '0');
  const tenantId = window._nexiaTenantId || new URLSearchParams(location.search).get('tenant') || 'nexia';
  const modules  = cart.map(m=>({id:m.id, name:m.name||m.id, price:m.price||0}));
  const btn = document.querySelector('#panel-pix .confirm-btn');
  if(btn){btn.disabled=true;btn.textContent='Processando...';}
  try {
    const res = await fetch('/api/payment', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        tenantId, action:'store_purchase', method:'PIX',
        amount: pixTotal, modules,
        description:'NEXIA Store — ' + modules.map(m=>m.name).catch(e => console.warn("[NEXIA] fetch failed:", e.message)).join(', ')
      })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Pagamento não processado');
    // Ativa módulos no Firestore após compra
    await fetch('/api/tenant', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tenantId, action:'activate_modules', moduleIds: modules.map(m=>m.id).catch(e => console.warn("[NEXIA] fetch failed:", e.message)) })
    }).catch(()=>{});
    closeCheckout(); closeCart();
    cart=[]; updateCartBadge(); renderGrid();
    toast(t('checkoutSuccess'));
  } catch(e) {
    toast('❌ Erro no pagamento: ' + e.message);
  } finally {
    if(btn){btn.disabled=false; btn.textContent=t('pixBtn')||'Já Paguei via PIX ✓';}
  }
}
async function confirmCard(){
  const name=document.getElementById('card-name').value.trim();
  const num=document.getElementById('card-number').value.trim();
  const exp=document.getElementById('card-expiry').value.trim();
  const cvv=document.getElementById('card-cvv').value.trim();
  const email=document.getElementById('card-email')?.value?.trim()||'';
  const inst=parseInt(document.getElementById('installments-select')?.value||'1');
  if(!name||num.length<19||exp.length<5||cvv.length<3){

  }
  const total = cart.reduce((s,m)=>s+(m.price||0),0);
  const tenantId = window._nexiaTenantId || new URLSearchParams(location.search).get('tenant') || 'nexia';
  const modules  = cart.map(m=>({id:m.id, name:m.name||m.id, price:m.price||0}));

      })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Pagamento não processado');
    await fetch('/api/tenant', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tenantId, action:'activate_modules', moduleIds: modules.map(m=>m.id).catch(e => console.warn("[NEXIA] fetch failed:", e.message)) })
    }).catch(()=>{});
    closeCheckout(); closeCart();
    cart=[]; updateCartBadge(); renderGrid();
    toast(t('checkoutSuccess'));
  } catch(e) {

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
function maskCard(el){
  let v=el.value.replace(/\D/g,'').substring(0,16);
  el.value=v.replace(/(.{4})/g,'$1 ').trim();
}
function maskExpiry(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>=3)v=v.substring(0,2)+'/'+v.substring(2,4);
  el.value=v;
}

function openDetail(id){
  const m = MODULES.find(m=>m.id===id);
  if(!m) return;
  const inCart = cart.some(c=>c.id===id);
  const detail = m.detail?.[LANG]||m.detail?.pt||m.desc?.[LANG]||m.desc?.pt||'';

  document.getElementById('detail-icon').textContent = m.icon;
  document.getElementById('detail-name').textContent = m.name;
  document.getElementById('detail-badge-modal').innerHTML = m.badge
    ? `<span class="badge ${m.badge}">${m.badge.toUpperCase()}</span>` : '';
  document.getElementById('detail-price').textContent = `R$ ${m.price}${t('monthLabel')}`;
  document.getElementById('detail-tags').innerHTML = m.tags.map(tag=>`<span class="tag">${tag}</span>`).join('');
  document.getElementById('detail-desc').textContent = detail;

  // Features
  const features = m.features || [];
  document.getElementById('detail-features').innerHTML = features.length
    ? `<h4>${t('detailFeatures')}</h4><ul>${features.map(f=>`<li>${f.pt||f}</li>`).join('')}</ul>` : '';

  // Use cases
  const usecases = m.usecases || [];
  document.getElementById('detail-usecases').innerHTML = usecases.length
    ? `<h4>${t('detailUsecases')}</h4><ul class="usecases">${usecases.map(u=>`<li>${u.pt||u}</li>`).join('')}</ul>` : '';

  // API endpoint
  document.getElementById('detail-endpoint').innerHTML = m.apiEndpoint
    ? `<h4>${t('detailEndpoint')}</h4><code>${m.apiEndpoint}</code>` : '';

  // Video thumbnail
  const vw = document.getElementById('detail-video-wrap');
  if(m.video){
    vw.style.display = 'block';
    vw.innerHTML = `<div class="video-thumb" onclick="loadVideo('${m.video}',this)">
      <img src="https://img.youtube.com/vi/${m.video}/hqdefault.jpg" alt="Demo ${m.name}" loading="lazy">
      <div class="play-btn">&#9654;</div>
      <div class="video-label">${t('watchDemo')}</div>
    </div>`;
  } else {
    vw.style.display = 'none';
    vw.innerHTML = '';
  }

  // Cart button
  const btn = document.getElementById('detail-cart-btn');
  btn.textContent = inCart ? t('removeFromCart') : t('addToCart');
  btn.className = 'confirm-btn' + (inCart ? ' added' : '');
  btn.onclick = () => { toggleCart(id); refreshDetailCartBtn(id); };

  document.getElementById('detail-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function refreshDetailCartBtn(id){
  const inCart = cart.some(c=>c.id===id);
  const btn = document.getElementById('detail-cart-btn');
  if(btn){
    btn.textContent = inCart ? t('removeFromCart') : t('addToCart');
    btn.className = 'confirm-btn' + (inCart ? ' added' : '');
  }
}

function closeDetail(){
  document.getElementById('detail-modal').classList.remove('open');
  document.body.style.overflow = '';
  // Kill iframe to stop video
  const iframe = document.querySelector('#detail-video-wrap iframe');
  if(iframe) iframe.src = '';
}

function loadVideo(vid, thumb){
  thumb.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen
    style="width:100%;height:100%;border-radius:10px;"></iframe>`;
  thumb.style.cursor = 'default';
  thumb.onclick = null;
}

async function aiSearchModules() {
  const q = document.getElementById('ai-search-input').value.trim();
  if(!q) return;
  const res = document.getElementById('ai-search-result');
  res.style.display = 'block';
  res.innerHTML = '<div style="color:rgba(232,240,255,.5);font-size:13px;text-align:center;padding:8px">✦ CORTEX analisando sua necessidade...</div>';
  try {
    const r = await fetch('/api/cortex', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        userId: (typeof NexiaAuth !== 'undefined' && typeof NexiaAuth.getUser === 'function' && NexiaAuth.getUser().catch(e => console.warn("[NEXIA] fetch failed:", e.message))?.uid) || window._nexiaUserId || 'anon',
        tenantId: window._nexiaTenantId || 'nexia',
        mode: 'store_search',
        message: 'Você é o assistente da NEXIA Store. O usuário precisa: "' + q + '". Liste até 3 módulos relevantes da store com: nome, motivo em 1 frase, preço estimado. Responda em português, formato estruturado.'
      })
    });
    const data = await r.json();
    const text = (data.response||data.content||'').replace(/\n/g,'<br>');
    res.innerHTML = text
      ? '<div style="font-size:13px;line-height:1.8;color:var(--text2)">' + text + '</div>'
      : '<div style="font-size:12px;color:var(--text3)">Nenhuma sugestão para essa busca. Navegue pelos módulos abaixo.</div>';
  } catch(e) {
    // Fallback keyword match local
    const words = q.toLowerCase().split(/\s+/);
    const matches = [];
    if(typeof AI_INTENT_MAP !== 'undefined') {
      for(const intent of AI_INTENT_MAP) {
        const score = intent.keywords.filter(k => words.some(w => w.includes(k)||k.includes(w))||q.toLowerCase().includes(k)).length;
        if(score > 0) matches.push({...intent, score});
      }
      matches.sort((a,b) => b.score-a.score);
    }
    if(matches.length > 0) {
      res.innerHTML = matches.slice(0,3).map(m =>
        '<div style="padding:8px 0;border-bottom:1px solid var(--brd)">' +
        '<div style="font-size:12px;font-weight:700;color:var(--text)">' + (m.modules||[]).join(', ') + '</div>' +
        '<div style="font-size:11px;color:var(--text3);margin-top:3px">' + (m.answer||'') + '</div></div>'
      ).join('');
    } else {
      res.innerHTML = '<div style="font-size:12px;color:var(--text3)">CORTEX temporariamente indisponível. Navegue pelos módulos abaixo.</div>';
    }
  }
}
