# ── Scheduled Functions ─────────────────────────────────────────────
# Dunning: roda todo dia às 09:00 BRT (12:00 UTC)
[functions."dunning-scheduler"]
  schedule = "0 12 * * *"

# Metrics aggregator: roda a cada hora
[functions."metrics-aggregator"]
  schedule = "0 * * * *"

[[redirects]]
  from = "/api/kpi"
  to = "/.netlify/functions/kpi-engine"
  status = 200

