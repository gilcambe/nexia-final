[build.environment]
  NODE_VERSION = "20"

# Required environment variables (set in Netlify Dashboard > Site Settings > Environment Variables):
# FIREBASE_SERVICE_ACCOUNT  — JSON da service account do Firebase
# GROQ_API_KEY              — API key do Groq (cortex-chat, multi-model)
# ANTHROPIC_API_KEY         — API key da Anthropic (takedown-gen, cortex-agent fallback)
# OPENAI_API_KEY            — API key da OpenAI (multi-model gpt-4o)
# DEEPSEEK_API_KEY          — API key do DeepSeek (multi-model coder)
# GEMINI_API_KEY             — API key do Google Gemini (studio.html modelo Gemini 2.0)
# XAI_API_KEY                — API key do xAI Grok (studio.html modelo Grok 3)
# STRIPE_SECRET_KEY          — API key Stripe para pagamentos USD (nexia-pay → Stripe)
# MP_ACCESS_TOKEN           — Token Mercado Pago (payment-engine)
# MP_WEBHOOK_SECRET         — Chave secreta webhook MP (Painel MP → Webhooks → Chave secreta)
# NEXIA_APP_URL             — URL pública do deploy (ex: https://nexia.netlify.app)
# TWILIO_ACCOUNT_SID        — (opcional) SID Twilio para PABX outbound
# TWILIO_AUTH_TOKEN         — (opcional) Auth Token Twilio
# TWILIO_FROM               — (opcional) Número Twilio +55...

